<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>啟程：大冒險</title>
    <style>
        /* =========================================
           CSS 樣式區塊：負責畫面排版、顏色與動畫特效
           ========================================= */
        
        :root {
            --scale: 1;
            --vh: 1vh;
            --user-ui-scale: 1;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
            position: fixed; 
            top: 0; 
            left: 0;
            width: 100%;
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100); 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
            overscroll-behavior: none;
            touch-action: none; 
        }

        /* 遊戲主舞台：新增像素風格的漸層藍天 */
        .stage {
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                #64b5f6 0%, #64b5f6 20%, 
                #4fc3f7 20%, #4fc3f7 40%, 
                #29b6f6 40%, #29b6f6 60%, 
                #03a9f4 60%, #03a9f4 80%, 
                #039be5 80%, #039be5 100%);
            overflow: hidden;
            display: none; 
        }

        .paused-anim * {
            animation-play-state: paused !important;
        }

        /* 雲朵樣式 */
        .cloud {
            position: absolute;
            z-index: 2; /* 放在角色和背景之間 */
            image-rendering: pixelated;
            opacity: 0.9;
            pointer-events: none;
        }

        .floor-track {
            position: absolute;
            bottom: 0;
            left: 0;
            display: flex;
            height: calc(400px * var(--scale));
            width: max-content;
            z-index: 3;
        }

        .floor-track img {
            width: calc(800px * var(--scale));
            height: calc(400px * var(--scale));
            object-fit: cover;
            image-rendering: pixelated; 
            flex-shrink: 0; 
        }

        #playerWrapper {
            position: absolute;
            bottom: calc(50px * var(--scale)); 
            left: 50%; 
            transform: translate(-50%, 0);
            z-index: 10;
        }

        #playerImg {
            width: calc(150px * var(--scale));
            image-rendering: pixelated; 
            transition: filter 0.1s; 
        }

        .monster {
            position: absolute;
            width: calc(180px * var(--scale));
            image-rendering: pixelated; 
            z-index: 5;
            transform-origin: center center; 
            transform: scaleX(var(--mirror, 1)); 
        }

        .projectile {
            position: absolute;
            font-size: calc(40px * var(--scale));
            font-weight: bold;
            image-rendering: pixelated; 
            z-index: 15;
            color: #d84315;
            text-shadow: 0 0 calc(10px * var(--scale)) #ff8a65; 
            transform-origin: center center;
        }

        .shield-item {
            position: absolute;
            width: calc(50px * var(--scale));
            image-rendering: pixelated;
            z-index: 6;
            animation: itemDrop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       itemShake 1.5s 0.5s infinite ease-in-out;
        }

        @keyframes itemDrop {
            0% { transform: translateY(-80px) scale(0.5) rotate(-15deg); opacity: 0; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes itemShake {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-4px) rotate(-10deg); }
            75% { transform: translateY(-4px) rotate(10deg); }
        }

        @keyframes damageFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(calc(-100px * var(--scale))) scale(1.5); opacity: 0; }
        }

        @keyframes monsterShake {
            0% { transform: scaleX(var(--mirror, 1)) translate(1px, 1px) rotate(0deg); }
            10% { transform: scaleX(var(--mirror, 1)) translate(-1px, -2px) rotate(-1deg); }
            20% { transform: scaleX(var(--mirror, 1)) translate(-3px, 0px) rotate(1deg); }
            30% { transform: scaleX(var(--mirror, 1)) translate(3px, 2px) rotate(0deg); }
            40% { transform: scaleX(var(--mirror, 1)) translate(1px, -1px) rotate(1deg); }
            50% { transform: scaleX(var(--mirror, 1)) translate(-1px, 2px) rotate(-1deg); }
            60% { transform: scaleX(var(--mirror, 1)) translate(-3px, 1px) rotate(0deg); }
            70% { transform: scaleX(var(--mirror, 1)) translate(3px, 1px) rotate(-1deg); }
            80% { transform: scaleX(var(--mirror, 1)) translate(-1px, -1px) rotate(1deg); }
            90% { transform: scaleX(var(--mirror, 1)) translate(1px, 2px) rotate(0deg); }
            100% { transform: scaleX(var(--mirror, 1)) translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes monsterShrinkVanish {
            0% { transform: scaleX(var(--mirror, 1)) scale(1); opacity: 1; }
            100% { transform: scaleX(var(--mirror, 1)) scale(0.1); opacity: 0; }
        }

        @keyframes whiteLightEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 calc(10px * var(--scale)) calc(5px * var(--scale)) #fff; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; box-shadow: 0 0 calc(40px * var(--scale)) calc(20px * var(--scale)) #fff; }
        }

        @keyframes logoBreathe {
            0% { transform: scale(0.5); }
            50% { transform: scale(0.55); } 
            100% { transform: scale(0.5); }
        }

        @keyframes mainLogoBreathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); }
        }

        @keyframes pulseText {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .monster-hit { animation: monsterShake 0.1s infinite; }
        .monster-vanishing { animation: monsterShrinkVanish 0.3s forwards; pointer-events: none; }
        
        .vfx-light {
            position: absolute;
            width: calc(15px * var(--scale)); 
            height: calc(15px * var(--scale));
            background-color: white;
            border-radius: 50%;
            z-index: 100;
            animation: whiteLightEffect 0.3s forwards;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            z-index: 120;
            pointer-events: none;
            animation: confettiFall 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes confettiFall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            50% { transform: translate(calc(var(--tx) * 0.8), var(--ty)) rotate(calc(var(--rot) / 2)); opacity: 1; }
            100% { transform: translate(var(--tx), calc(var(--ty) + 120px)) rotate(var(--rot)); opacity: 0; }
        }

        /* === UI 介面 (抬頭顯示器 HUD) === */
        .hud-stats-container { 
            position: absolute; top: calc(20px * var(--scale)); left: calc(20px * var(--scale)); z-index: 100; 
            display: flex; flex-direction: column; gap: calc(10px * var(--scale));
            transform: scale(var(--user-ui-scale)); transform-origin: top left;
        }
        
        .hud-highest-lv {
            /* 調整最高紀錄的位置往下，避免與護盾條重疊 */
            position: absolute; top: calc(160px * var(--scale)); left: calc(20px * var(--scale));
            background: rgba(255, 215, 0, 0.15); 
            border: calc(1px * var(--scale)) solid rgba(255, 215, 0, 0.4);
            padding: calc(5px * var(--scale)) calc(12px * var(--scale)); 
            border-radius: calc(15px * var(--scale));
            color: #ffd54f; font-weight: bold; 
            font-size: calc(14px * var(--scale));
            z-index: 100; text-shadow: 1px 1px 2px black;
            backdrop-filter: blur(5px);
            transform: scale(var(--user-ui-scale)); transform-origin: top left;
        }

        .hud-exp {
            position: absolute; bottom: calc(5px * var(--scale)); left: 50%;
            transform: translateX(-50%) scale(var(--user-ui-scale)); 
            transform-origin: bottom center;
            z-index: 100;
        }

        .stat-box {
            display: flex; align-items: center; gap: calc(10px * var(--scale));
            background: rgba(0, 0, 0, 0.6); 
            padding: calc(8px * var(--scale)) calc(15px * var(--scale));
            border-radius: calc(25px * var(--scale)); 
            border: calc(2px * var(--scale)) solid rgba(255, 255, 255, 0.2);
            color: white; font-weight: bold; backdrop-filter: blur(5px);
        }
        .stat-label { font-size: calc(18px * var(--scale)); min-width: calc(45px * var(--scale)); text-shadow: 1px 1px 2px black; }
        .bar-bg {
            width: calc(200px * var(--scale)); height: calc(18px * var(--scale));
            background: rgba(255, 255, 255, 0.2); border-radius: calc(10px * var(--scale));
            overflow: hidden; box-shadow: inset 0 calc(2px * var(--scale)) calc(5px * var(--scale)) rgba(0,0,0,0.5);
        }
        .bar-fill { height: 100%; transition: width 0.3s ease-out; }
        .hp-fill { background: linear-gradient(90deg, #d32f2f, #f44336); width: 100%; }
        .shield-fill { background: linear-gradient(90deg, #9e9e9e, #e0e0e0); width: 0%; }
        .exp-fill { background: linear-gradient(90deg, #fbc02d, #ffeb3b); width: 0%; }
        .stat-text { font-size: calc(14px * var(--scale)); min-width: calc(70px * var(--scale)); text-align: center; }

        #gameLogo {
            position: absolute; top: calc(-20px * var(--scale)); right: calc(-30px * var(--scale)); 
            width: calc(300px * var(--scale)); 
            z-index: 90; pointer-events: none; 
            animation: logoBreathe 2.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 calc(10px * var(--scale)) rgba(0,0,0,0.8)); 
        }

        .hint { 
            position: absolute; top: calc(80px * var(--scale)); width: 100%;
            text-align: center; color: rgba(255,255,255,0.4); 
            font-size: calc(16px * var(--scale)); pointer-events: none; z-index: 100;
        }

        /* === 操作按鈕 === */
        .controls-left { 
            position: absolute; bottom: calc(40px * var(--scale)); left: calc(40px * var(--scale)); 
            display: flex; gap: calc(20px * var(--scale)); z-index: 100; 
            transform: scale(var(--user-ui-scale)); transform-origin: bottom left;
        }
        .controls-right { 
            position: absolute; bottom: calc(40px * var(--scale)); right: calc(40px * var(--scale)); 
            display: flex; flex-direction: column-reverse; gap: calc(20px * var(--scale)); z-index: 100; align-items: flex-end; 
            transform: scale(var(--user-ui-scale)); transform-origin: bottom right;
        }
        .controls-top-center { 
            position: absolute; top: calc(20px * var(--scale)); left: 50%; 
            transform: translateX(-50%) scale(var(--user-ui-scale)); 
            transform-origin: top center;
            display: flex; gap: calc(15px * var(--scale)); z-index: 100; 
        }

        .btn {
            width: calc(70px * var(--scale)); height: calc(70px * var(--scale));
            background: rgba(255, 255, 255, 0.2); color: white;
            border: calc(2px * var(--scale)) solid rgba(255, 255, 255, 0.5); 
            border-radius: 50%;
            font-size: calc(28px * var(--scale)); cursor: pointer; display: flex;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: 0.1s;
            touch-action: none; 
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
        
        .btn.jump-btn { width: calc(90px * var(--scale)); height: calc(90px * var(--scale)); font-size: calc(22px * var(--scale)); font-weight: bold; background: rgba(216, 67, 21, 0.6); border-color: rgba(255, 138, 101, 0.8); }
        .btn.jump-btn:active { background: rgba(191, 54, 12, 0.8); }
        .btn.attack-btn { width: calc(80px * var(--scale)); height: calc(80px * var(--scale)); font-size: calc(20px * var(--scale)); font-weight: bold; background: rgba(191, 54, 12, 0.6); border-color: rgba(255, 138, 101, 0.8); }
        .btn.attack-btn:active { background: rgba(127, 36, 8, 0.8); }
        .btn.sys-btn { width: auto; height: calc(40px * var(--scale)); padding: 0 calc(15px * var(--scale)); font-size: calc(14px * var(--scale)); border-radius: calc(20px * var(--scale)); font-weight: bold; }
        .btn.sys-btn.pause-toggle { background: rgba(255, 193, 7, 0.5); border-color: rgba(255, 235, 59, 0.8); }

        /* === 選單與介面視窗 === */
        .pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            z-index: 999; display: flex; justify-content: center; align-items: center;
        }
        .pause-menu {
            background: rgba(20, 20, 20, 0.8); padding: calc(50px * var(--scale)) calc(80px * var(--scale));
            border-radius: calc(20px * var(--scale)); border: calc(2px * var(--scale)) solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: calc(25px * var(--scale)); text-align: center;
            box-shadow: 0 calc(10px * var(--scale)) calc(40px * var(--scale)) rgba(0,0,0,0.8);
        }
        .pause-menu h2 { color: white; margin: 0 0 calc(20px * var(--scale)) 0; font-size: calc(40px * var(--scale)); letter-spacing: calc(5px * var(--scale)); text-shadow: 2px 2px 5px black; }

        .menu-btn {
            background: rgba(255, 255, 255, 0.8); color: #111; border: none;
            padding: calc(15px * var(--scale)) calc(40px * var(--scale)); 
            font-size: calc(22px * var(--scale)); font-weight: bold;
            border-radius: calc(40px * var(--scale)); cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            touch-action: none;
        }
        .menu-btn:hover { background: white; transform: scale(1.05); }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn.danger { background: rgba(244, 67, 54, 0.8); color: white; }
        .menu-btn.danger:hover { background: rgba(244, 67, 54, 1); }

        #menuBgVideo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1500; 
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; 
        }

        #mainMenuLogo {
            width: calc(450px * var(--scale)); margin-bottom: calc(40px * var(--scale));
            animation: mainLogoBreathe 3s infinite ease-in-out; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }
        .main-btn-group { display: flex; flex-direction: column; gap: calc(20px * var(--scale)); width: calc(250px * var(--scale)); z-index: 10; }
        
        .blur-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); z-index: -1;
        }
        .settings-content {
            background: rgba(20, 20, 20, 0.8); padding: calc(50px * var(--scale)) calc(80px * var(--scale));
            border-radius: calc(20px * var(--scale)); border: calc(2px * var(--scale)) solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: calc(25px * var(--scale)); text-align: center; color: white;
            box-shadow: 0 calc(10px * var(--scale)) calc(40px * var(--scale)) rgba(0,0,0,0.8);
        }
        .settings-content h2 { margin: 0; font-size: calc(36px * var(--scale)); letter-spacing: calc(3px * var(--scale)); }
        .settings-item { display: flex; flex-direction: column; gap: calc(10px * var(--scale)); align-items: center; font-size: calc(20px * var(--scale)); font-weight: bold; width: 100%; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* === GAME OVER 畫面樣式 === */
        .game-over-title {
            color: #ff3333;
            font-size: calc(80px * var(--scale));
            font-weight: bold;
            margin-bottom: calc(40px * var(--scale));
            letter-spacing: calc(10px * var(--scale));
            text-shadow: 0 0 calc(20px * var(--scale)) #ff0000, 2px 2px 0 #fff;
            z-index: 10;
        }

        #orientationOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            z-index: 99999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; display: none; 
        }
        #orientationOverlay h1 { font-size: 32px; margin-bottom: 20px; color: #ffeb3b;}
        #orientationOverlay p { font-size: 18px; line-height: 1.5; padding: 0 20px; }
        
        .rotate-phone-icon {
            width: 80px; height: 120px; border: 4px solid white; border-radius: 10px;
            margin-bottom: 30px; position: relative; animation: rotatePhone 2s infinite ease-in-out;
        }
        .rotate-phone-icon::after {
            content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 15px; border-radius: 50%; border: 2px solid white;
        }

        @keyframes rotatePhone { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
        @media screen and (orientation: portrait) { #orientationOverlay { display: flex !important; } }

        .tap-hint {
            color: rgba(255,255,255,0.7); font-size: calc(16px * var(--scale));
            margin-top: calc(20px * var(--scale)); animation: pulseText 2s infinite ease-in-out;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="orientationOverlay">
        <div class="rotate-phone-icon"></div>
        <h1>請旋轉手機</h1>
        <p>為了獲得最佳遊戲體驗，<br>請將您的設備旋轉至<b>橫向 (Landscape)</b> 遊玩。</p>
    </div>

    <video id="menuBgVideo" autoplay muted playsinline></video>

    <div id="mainMenu" class="screen">
        <img id="mainMenuLogo" src="Game_LOGO.png" alt="Game Logo">
        <div class="main-btn-group">
            <button class="menu-btn" id="startBtn">遊玩遊戲</button>
            <button class="menu-btn" id="openSettingsBtn">系統設定</button>
            <button class="menu-btn danger" id="exitBrowserBtn">回到瀏覽器</button>
        </div>
        <div class="tap-hint" id="bgmHint">(點擊畫面任意處，開啟熱血冒險音樂！)</div>
    </div>

    <div id="settingsMenu" class="screen" style="display: none;">
        <div class="blur-overlay"></div> 
        <div class="settings-content">
            <h2>系統設定</h2>
            <div class="settings-item">
                <label for="volumeSlider">遊戲音量 (BGM): <span id="volText">30</span>%</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="30">
            </div>
            <div class="settings-item">
                <label for="uiScaleSlider">按鈕大小: <span id="uiScaleText">100</span>%</label>
                <input type="range" id="uiScaleSlider" min="50" max="250" value="100">
            </div>
            <button class="menu-btn" id="closeSettingsBtn" style="margin-top: 20px;">返回</button>
        </div>
    </div>

    <div id="gameOverOverlay" class="screen" style="display: none; z-index: 3000;">
        <div class="blur-overlay" style="background: rgba(0, 0, 0, 0.8);"></div> 
        <h1 class="game-over-title">GAME OVER</h1>
        <button class="menu-btn" id="gameOverContinueBtn" style="z-index: 10;">繼續</button>
    </div>

    <div class="stage" id="gameStage">
        
        <img id="gameLogo" src="Game_LOGO.png" alt="Game Logo">

        <div class="hud-stats-container">
            <div class="stat-box">
                <span class="stat-label" style="color: #ff5252;">HP</span>
                <div class="bar-bg"><div class="bar-fill hp-fill" id="hpBar"></div></div>
                <span class="stat-text" id="hpText">100 / 100</span>
            </div>
            <div class="stat-box">
                <span class="stat-label" style="color: #bdbdbd;">🛡️</span>
                <div class="bar-bg"><div class="bar-fill shield-fill" id="shieldBar"></div></div>
                <span class="stat-text" id="shieldText">0 / 50</span>
            </div>
        </div>

        <div class="hud-highest-lv">
            👑 最高紀錄: LV <span id="highestLvText">1</span>
        </div>

        <div class="hud-exp">
            <div class="stat-box">
                <span class="stat-label" id="lvText" style="color: #ffd54f;">LV 1</span>
                <div class="bar-bg"><div class="bar-fill exp-fill" id="expBar"></div></div>
                <span class="stat-text" id="expText">0 / 2</span>
            </div>
        </div>

        <div class="floor-track" id="floorTrack"></div>

        <div id="playerWrapper">
            <img id="playerImg" src="yayun_stand.png" alt="角色">
        </div>

        <div class="hint">鍵盤 ← →, Space (跳躍), A (攻擊)</div>
        
        <div class="controls-left">
            <div class="btn" id="leftBtn">◀</div>
            <div class="btn" id="rightBtn">▶</div>
        </div>

        <div class="controls-right">
            <div class="btn attack-btn" id="attackBtn">ATK</div>
            <div class="btn jump-btn" id="jumpBtn">JUMP</div>
        </div>

        <div class="controls-top-center">
            <div class="btn sys-btn" id="gameSettingsBtn">設定</div>
            <div class="btn sys-btn pause-toggle" id="pauseBtn">暫停</div>
            <div class="btn sys-btn" id="fullscreenBtn">全螢幕</div>
        </div>

        <div id="pauseOverlay" class="pause-overlay" style="display: none;">
            <div class="pause-menu">
                <h2>遊戲暫停</h2>
                <button class="menu-btn" id="resumeBtn">繼續遊玩</button>
                <button class="menu-btn" id="restartBtn">重新遊玩</button>
                <button class="menu-btn danger" id="homeBtn">回到主頁</button>
            </div>
        </div>
    </div>

    <script>
        // === 主選單影片與背景控制邏輯 ===
        const bgVideos = [
            { src: 'Game_start_movie_sunny.mp4', theme: 'sunny' },
            { src: 'Game_start_background_RedForest.mp4', theme: 'forest' }
        ];
        
        let currentBgIndex = Math.floor(Math.random() * bgVideos.length);
        const menuBgVideo = document.getElementById('menuBgVideo');
        menuBgVideo.src = bgVideos[currentBgIndex].src;
        let currentMenuTheme = bgVideos[currentBgIndex].theme; 

        let shouldSwitchVideo = false;

        // === 全新動態 BGM 平滑淡入淡出系統 ===
        let audioCtx = null;

        const sunnyMelody = [76, 0, 81, 0, 84, 0, 83, 81, 81, 0, 77, 0, 81, 0, 79, 77, 79, 0, 76, 0, 79, 0, 77, 76, 74, 0, 71, 0, 74, 0, 76, 0];
        const sunnyBass = [45, 45, 57, 45, 45, 45, 57, 45, 41, 41, 53, 41, 41, 41, 53, 41, 48, 48, 60, 48, 48, 48, 60, 48, 43, 43, 55, 43, 43, 43, 55, 43];

        const forestMelody = [72, 0, 75, 0, 71, 0, 74, 0, 69, 0, 72, 0, 68, 0, 71, 0];
        const forestBass = [48, 0, 0, 0, 47, 0, 0, 0, 45, 0, 0, 0, 44, 0, 0, 0];

        const battleMelody = [76, 76, 79, 76, 81, 76, 83, 84, 76, 76, 79, 76, 84, 83, 81, 79];
        const battleBass = [40, 40, 40, 40, 40, 40, 40, 40, 43, 43, 43, 43, 45, 45, 46, 46];

        let currentMelody = [];
        let currentBass = [];
        let currentBPM = 100;
        let melodyWave = 'square';
        let bassWave = 'sawtooth';
        let noteLength = 0;
        let currentBgmTheme = '';

        function setBGM(theme) {
            if (currentBgmTheme === theme) return;
            currentBgmTheme = theme;

            const applyThemeSettings = () => {
                currentNote = 0; 
                if (theme === 'sunny') {
                    currentMelody = sunnyMelody; currentBass = sunnyBass;
                    currentBPM = 150; melodyWave = 'square'; bassWave = 'sawtooth';
                } else if (theme === 'forest') {
                    currentMelody = forestMelody; currentBass = forestBass;
                    currentBPM = 90; melodyWave = 'sine'; bassWave = 'triangle';
                } else if (theme === 'battle') {
                    currentMelody = battleMelody; currentBass = battleBass;
                    currentBPM = 180; melodyWave = 'square'; bassWave = 'sawtooth';
                }
                noteLength = (60 / currentBPM) / 2;
            };

            // 如果音樂引擎尚未啟動，直接切換設定即可
            if (!audioCtx || !masterGain) {
                applyThemeSettings();
                return;
            }

            let targetVol = (parseInt(volumeSlider.value) / 100) * 0.3;

            // 淡出音樂 (1秒)
            masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
            masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);

            // 1秒後切換樂譜，並開始淡入
            setTimeout(() => {
                applyThemeSettings();
                masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                masterGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + 1.0);
            }, 1000);
        }

        setBGM(currentMenuTheme);

        const unlockAudio = () => {
            if (isAudioUnlocked) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(0);
            oscillator.stop(audioCtx.currentTime + 0.01);
            isAudioUnlocked = true;
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchend', unlockAudio);
            initAudio();
        };

        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchend', unlockAudio);

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isBgmPlaying) return; 
            if (!masterGain) {
                masterGain = audioCtx.createGain();
                let currentVol = parseInt(volumeSlider.value) / 100;
                masterGain.gain.value = currentVol * 0.3; 
                masterGain.connect(audioCtx.destination);
            }
            isBgmPlaying = true;
            bgmHint.style.display = 'none'; 
            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleAudio();
        }

        function playTone(midiNote, time, type, duration, volScale) {
            if (midiNote === 0 || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; 
            osc.frequency.value = 440 * Math.pow(2, (midiNote - 69) / 12);
            osc.connect(gain);
            gain.connect(masterGain);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(volScale, time + 0.01);
            gain.gain.setValueAtTime(volScale, time + duration - 0.03);
            gain.gain.linearRampToValueAtTime(0, time + duration);
            osc.start(time);
            osc.stop(time + duration);
        }

        function scheduleAudio() {
            if (!isBgmPlaying) return;
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                if (currentMelody[currentNote]) playTone(currentMelody[currentNote], nextNoteTime, melodyWave, noteLength * 0.8, 0.4);
                if (currentBass[currentNote]) playTone(currentBass[currentNote], nextNoteTime, bassWave, noteLength * 0.9, 0.5);
                nextNoteTime += noteLength;
                currentNote = (currentNote + 1) % currentMelody.length; 
            }
            timerID = requestAnimationFrame(scheduleAudio);
        }

        // === 遊戲核心函數 ===

        function fireConfetti(amount) {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'];
            const shapes = ['50%', '0%']; 
            for (let i = 0; i < amount; i++) {

                conf.style.width = `${size}px`;
                conf.style.height = `${size * (Math.random() > 0.5 ? 1 : 1.5)}px`; 
                conf.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = `calc(50% + ${Math.random() * 20 - 10}px)`;
                conf.style.bottom = `80px`; 
                let angle = (Math.random() * 140 + 200) * Math.PI / 180; 
                let dist = Math.random() * 120 + 80; 
                let tx = Math.cos(angle) * dist;
                let ty = Math.sin(angle) * dist; 
                conf.style.setProperty('--tx', `${tx}px`);
                conf.style.setProperty('--ty', `${ty}px`);
                let rot = Math.random() * 720 - 360; 
                conf.style.setProperty('--rot', `${rot}deg`);
                playerWrapper.appendChild(conf);
                setTimeout(() => { if (conf.parentNode) conf.parentNode.removeChild(conf); }, 1000);

        function updateHUD() {

        function gainEXP(amount) {
            playerEXP += amount;
            let leveledUp = false;
            while (playerEXP >= playerMaxEXP) {
                playerEXP -= playerMaxEXP; 
                playerLV++;                
                playerMaxEXP = Math.pow(2, playerLV); 
                leveledUp = true;
                if (playerLV > highestLV) {
                    highestLV = playerLV;
                    localStorage.setItem('rpg_game_highest_lv', highestLV);
                }
            }
            if (leveledUp) {
                let confettiAmount = (playerLV % 5 === 0) ? 100 : 30;
                fireConfetti(confettiAmount);
                if (isMobile && navigator.vibrate) navigator.vibrate([50, 50, 100]); 
            }
            updateHUD();
        }

        function takeDamage(amount, knockbackDir) {
            if (playerIsHurt || playerHP <= 0) return; 

            if (playerShield > 0) {
                if (playerShield >= amount) {
                    playerShield -= amount;
                } else {
                    let remainder = amount - playerShield;
                    playerShield = 0;
                    playerHP -= remainder;
                }
            } else {
                playerHP -= amount;
            }

            if (playerHP < 0) playerHP = 0;
            updateHUD();

            spawnDamageText((gameStage.offsetWidth / gameScale) / 2, logicCharY + 100, amount);

            playerIsHurt = true;
            playerHurtTimer = 300; 
            playerHurtDir = knockbackDir;

                }, 500);

        function gameLoop() {

            updatePhysics();

        function updateFloor() {
            if (movingDir !== 0) {
                logicFloorX -= movingDir * BASE_MOVE_SPEED; 
                playerImg.style.transform = movingDir === 1 ? 'scaleX(1)' : 'scaleX(-1)'; 
                facingDir = movingDir;
            }

            if (logicFloorX <= -BASE_FLOOR_WIDTH * 2) {
                logicFloorX += BASE_FLOOR_WIDTH; 
                floorTrack.removeChild(floorTrack.firstElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.appendChild(newImg); 
            }
            else if (logicFloorX >= 0) {
                logicFloorX -= BASE_FLOOR_WIDTH; 
                floorTrack.removeChild(floorTrack.lastElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.insertBefore(newImg, floorTrack.firstElementChild);

            floorTrack.style.transform = `translateX(${logicFloorX * gameScale}px)`;

        // --- 雲朵控制邏輯 (視差效果) ---
        function updateClouds() {
            let screenLogicWidth = gameStage.offsetWidth / gameScale;

            cloudSpawnTimer -= 20;
            if (cloudSpawnTimer <= 0) {
                // 決定雲朵從哪邊生出來
                let spawnX = movingDir === -1 ? -300 : screenLogicWidth + 300;
                spawnCloud(spawnX);
                cloudSpawnTimer = Math.random() * 3000 + 2000; // 2000 ~ 5000ms
            }

            for (let i = clouds.length - 1; i >= 0; i--) {
                let c = clouds[i];
                
                // 視差移動：雲朵移動速度只有地板的 30%
                if (movingDir !== 0) {
                    c.logicX -= movingDir * BASE_MOVE_SPEED * 0.3; 
                }
                // 加入一點點自然風吹的微小漂移，即使不走動雲也會輕輕飄
                c.logicX -= 0.5;

                c.el.style.left = `${c.logicX * gameScale}px`;

                // 超出邊界回收
                if (c.logicX < -600 || c.logicX > screenLogicWidth + 600) {
                    if (c.el.parentNode) gameStage.removeChild(c.el);
                    clouds.splice(i, 1);
                }
            }
        }

        function spawnCloud(startX) {
            let img = document.createElement('img');
            img.src = cloudImages[Math.floor(Math.random() * cloudImages.length)];
            img.className = 'cloud';
            
            let screenLogicWidth = gameStage.offsetWidth / gameScale;
            let spawnX = startX !== undefined ? startX : screenLogicWidth + 300;
            
            // 雲朵高度生成在畫面偏上方的位置
            let spawnY = Math.random() * 300 + 250; 
            let scale = Math.random() * 0.6 + 0.4; // 0.4x ~ 1.0x

            img.style.left = `${spawnX * gameScale}px`;
            img.style.bottom = `${spawnY * gameScale}px`;
            img.style.transform = `scale(${scale})`;

            gameStage.appendChild(img);
            clouds.push({ el: img, logicX: spawnX });
        }

        function updatePhysics() {
            if (isJumping) {
                logicCharY += logicVelocityY; 
                logicVelocityY -= BASE_GRAVITY; 

                if (logicCharY <= 0) {
                    logicCharY = 0;
                    isJumping = false;
                    logicVelocityY = 0;
                }
            }

            let knockbackPixelOffset = 0;
            if (playerIsHurt) {
                playerHurtTimer -= 20;
                if (playerHurtTimer > 0) {
                    let progress = playerHurtTimer / 300; 
                    knockbackPixelOffset = Math.sin(progress * Math.PI) * 50 * playerHurtDir;
                    playerImg.style.filter = 'brightness(1.5) sepia(1) hue-rotate(-50deg) saturate(5)';
                } else {
                    playerIsHurt = false;
                    playerImg.style.filter = 'none';
                }
            } else {
                playerImg.style.filter = 'none';
            }

            playerWrapper.style.transform = `translate(calc(-50% + ${knockbackPixelOffset * gameScale}px), -${logicCharY * gameScale}px)`;
        }

        function updateAnimation() {
            if (attacking) {
                playerImg.src = attackImg;
                attackTimer -= 20; 
                if (attackTimer <= 0) attacking = false; 
                return; 
            }

            if (isJumping) {
                playerImg.src = jumpImg; 
                return;
            }

            if (movingDir === 0) {
                playerImg.src = standImg; 
                currentFrame = 0;
                animTimer = 0;
                return;
            }

            animTimer += 20; 
            if (animTimer >= 100) { 
                currentFrame = (currentFrame + 1) % walkCycle.length;
                playerImg.src = walkCycle[currentFrame];
                animTimer = 0;
            }
        }

        function updateEntities() {
            let screenLogicWidth = gameStage.offsetWidth / gameScale;
            let playerRect = playerImg.getBoundingClientRect(); 

            if (movingDir !== 0) {
                monsterSpawnTimer -= 20; 
                if (monsterSpawnTimer <= 0) {
                    spawnMonster();
                    monsterSpawnTimer = Math.random() * 1500 + 1500; 
                }
            }

            for (let i = shields.length - 1; i >= 0; i--) {
                let shield = shields[i];
                if (movingDir !== 0) {
                    shield.logicX -= movingDir * BASE_MOVE_SPEED;
                    shield.el.style.left = `${shield.logicX * gameScale}px`;
                }

                if (shield.logicX < -200 || shield.logicX > screenLogicWidth + 200) {
                    if(shield.el.parentNode) gameStage.removeChild(shield.el);
                    shields.splice(i, 1);
                    continue;
                }

                let shieldRect = shield.el.getBoundingClientRect();
                if (
                    playerRect.x < shieldRect.x + shieldRect.width &&
                    playerRect.x + playerRect.width > shieldRect.x &&
                    playerRect.y < shieldRect.y + shieldRect.height &&
                    playerRect.y + playerRect.height > shieldRect.y
                ) {
                    if (playerShield < playerMaxShield) {
                        if(shield.el.parentNode) gameStage.removeChild(shield.el);
                        shields.splice(i, 1);
                        playerShield = Math.min(playerMaxShield, playerShield + 10);
                        updateHUD();
                        spawnTemporaryLightEffect(shield.logicX, 120); 
                    }
                }
            }

            for (let i = monsters.length - 1; i >= 0; i--) {
                let monster = monsters[i];
                
                if (!monster.hit && !monster.done) {
                    if (monster.attacking) {
                        monster.attackTimer += 20;
                        if (monster.attackTimer >= 100) { 
                            monster.attackTimer = 0;
                            monster.attackFrame++;
                            if (monster.attackFrame < monsterAttackCycle.length) {
                                monster.el.src = monsterAttackCycle[monster.attackFrame];
                            } else {
                                monster.attacking = false;
                                monster.el.src = monsterWalkCycle[monster.frame];
                                
                                let pCenter = playerRect.x + playerRect.width / 2;
                                let mCenter = monster.el.getBoundingClientRect().x + monster.el.getBoundingClientRect().width / 2;
                                takeDamage(6, pCenter < mCenter ? -1 : 1);
                            }
                        }
                        
                        if (movingDir !== 0) {
                            monster.logicX -= movingDir * BASE_MOVE_SPEED;
                            monster.el.style.left = `${monster.logicX * gameScale}px`;
                        }

                    } else {
                        monster.logicX += (BASE_MONSTER_SPEED * monster.dir) - (movingDir * BASE_MOVE_SPEED);
                        monster.el.style.left = `${monster.logicX * gameScale}px`;
                        
                        monster.animTimer += 20;
                        if (monster.animTimer >= 100) {
                            monster.frame = (monster.frame + 1) % monsterWalkCycle.length;
                            monster.el.src = monsterWalkCycle[monster.frame];
                            monster.animTimer = 0;
                        }
                        
                        let monsterRect = monster.el.getBoundingClientRect(); 
                        if (
                            playerRect.x < monsterRect.x + monsterRect.width &&
                            playerRect.x + playerRect.width > monsterRect.x &&
                            playerRect.y < monsterRect.y + monsterRect.height &&
                            playerRect.y + playerRect.height > monsterRect.y
                        ) {
                            monster.attacking = true;
                            monster.attackFrame = 0;
                            monster.attackTimer = 0;
                            monster.el.src = monsterAttackCycle[0];
                        }

                        if (monster.logicX < -200 || monster.logicX > screenLogicWidth + 200) {
                            gameStage.removeChild(monster.el);
                            monsters.splice(i, 1);
                            continue; 
                        }
                    }
                }

                if (monster.hit) {
                    monster.hitTimer -= 20; 
                    if (monster.hitTimer <= 0) {
                        monster.hit = false;
                        monster.done = true;
                        monster.doneTimer = 300; 
                        monster.el.className = 'monster monster-vanishing'; 
                        spawnTemporaryLightEffect(monster.logicX + 90, 120); 
                    }
                }
                
                if (monster.done) {
                    monster.doneTimer -= 20;
                    if (monster.doneTimer <= 0) {
                        if (monster.el.parentNode) gameStage.removeChild(monster.el);
                        monsters.splice(i, 1);
                        continue;
                    }
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let projectile = projectiles[i];
                projectile.logicX += BASE_PROJECTILE_SPEED * projectile.dir;
                projectile.el.style.left = `${projectile.logicX * gameScale}px`;

                let projectileRect = projectile.el.getBoundingClientRect(); 

                for (let j = monsters.length - 1; j >= 0; j--) {
                    let monster = monsters[j];
                    if (monster.hit || monster.done) continue; 
                    
                    let monsterRect = monster.el.getBoundingClientRect(); 

                    if (
                        projectileRect.x < monsterRect.x + monsterRect.width &&
                        projectileRect.x + projectileRect.width > monsterRect.x &&
                        projectileRect.y < monsterRect.y + monsterRect.height &&
                        projectileRect.y + projectileRect.height > monsterRect.y
                    ) {
                        gameStage.removeChild(projectile.el); 
                        projectiles.splice(i, 1); 
                        
                        monster.hit = true; 
                        monster.hitTimer = HARM_STATE_TIME; 
                        monster.el.src = harmImg; 
                        monster.el.className = 'monster monster-hit'; 
                        
                        gainEXP(1); 
                        
                        // 擊殺掉落機制改為「每固定 3 隻」
                        killCount++;
                        if (killCount >= SHIELD_KILL_THRESHOLD) {
                            killCount = 0;
                            if (Math.random() <= 0.20) {
                                spawnShield(monster.logicX); 
                            }
                        }
                        break; 
                    }
                }

                if (projectiles[i] === projectile) { 
                    if (projectile.logicX < -100 || projectile.logicX > screenLogicWidth + 100) {
                        if (projectile.el.parentNode) {
                            gameStage.removeChild(projectile.el);
                            projectiles.splice(i, 1);
                        }
                    }
                }
            }
        }

        function spawnShield(spawnLogicX) {
            let img = document.createElement('img');
            img.src = 'game_shield.png'; 
            img.className = 'shield-item';
            
            let initialLogicX = spawnLogicX !== undefined ? spawnLogicX : (gameStage.offsetWidth / gameScale + 50);
            img.style.left = `${initialLogicX * gameScale}px`;
            img.style.bottom = `calc(90px * var(--scale))`; 
            gameStage.appendChild(img);
            shields.push({ el: img, logicX: initialLogicX });
        }

        function spawnMonster() {
            let img = document.createElement('img');
            img.src = monsterWalkCycle[0]; 
            img.className = 'monster';
            
            let screenLogicWidth = gameStage.offsetWidth / gameScale;
            let initialLogicX = movingDir === 1 ? screenLogicWidth : -180;
            let dir = movingDir === 1 ? -1 : 1; 

            img.style.left = `${initialLogicX * gameScale}px`;
            img.style.bottom = `calc(90px * var(--scale))`; 

            let mirrorValue = (dir === 1) ? -1 : 1;
            img.style.setProperty('--mirror', mirrorValue);

            gameStage.appendChild(img);
            monsters.push({ 
                el: img, logicX: initialLogicX, dir: dir, hit: false, hitTimer: 0, 
                done: false, doneTimer: 0, frame: 0, animTimer: 0,
                attacking: false, attackFrame: 0, attackTimer: 0
            });
        }

        function spawnTemporaryLightEffect(logicX, logicY) {
            let span = document.createElement('div');
            span.className = 'vfx-light';
            span.style.left = `${logicX * gameScale}px`;
            span.style.bottom = `${logicY * gameScale}px`;
            gameStage.appendChild(span);
            span.addEventListener('animationend', () => {
                if (span.parentNode) gameStage.removeChild(span); 
            });
        }

        function spawnProjectile() {
            let span = document.createElement('span');
            span.innerHTML = '🔥';
            span.className = 'projectile';
            
            if (facingDir === 1) span.style.transform = 'rotate(90deg)';
            else span.style.transform = 'rotate(-90deg)';
            
            let spawnLogicX = (gameStage.offsetWidth / gameScale) / 2;
            let spawnLogicY = 50 + logicCharY + 80; 

            span.style.left = `${spawnLogicX * gameScale}px`;
            span.style.bottom = `${spawnLogicY * gameScale}px`;
            gameStage.appendChild(span);
            projectiles.push({ el: span, logicX: spawnLogicX, dir: facingDir });
        }

        // === 玩家控制邏輯 ===

        function jump() {
            if (!isJumping && !isPaused && playerHP > 0) {
                isJumping = true;
                logicVelocityY = BASE_JUMP_POWER; 
            }
        }

        function attack() {
            if (!attacking && !isPaused && playerHP > 0) {
                attacking = true;
                attackTimer = 200; 
                playerImg.src = attackImg; 
                spawnProjectile();
            }
        }

        function updateMovingDir() {
            if (keys.right && !keys.left) movingDir = 1;
            else if (keys.left && !keys.right) movingDir = -1;
            else movingDir = 0;
        }

        // === 系統功能 (暫停與選單切換) ===

        startBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            menuBgVideo.style.display = 'none'; 
            gameStage.style.display = 'block';
            pauseOverlay.style.display = 'none'; 
            isPaused = false; 
            
            setBGM('battle'); 
            
            checkOrientation(); 
            if(isMobile) toggleFullScreen();
        });

        openSettingsBtn.addEventListener('click', () => {
            settingsSource = 'main'; 
            mainMenu.style.display = 'none';
            settingsMenu.style.backgroundImage = "url('game_start_background.png')";
            settingsMenu.style.display = 'flex';
        });

        gameSettingsBtn.addEventListener('click', () => {
            settingsSource = 'game'; 
            if (!isPaused) togglePause(); 
            pauseOverlay.style.display = 'none'; 
            settingsMenu.style.backgroundImage = 'none';
            settingsMenu.style.display = 'flex'; 
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none';
            if (settingsSource === 'main') mainMenu.style.display = 'flex';
            else if (settingsSource === 'game') pauseOverlay.style.display = 'flex'; 
        });

        exitBrowserBtn.addEventListener('click', () => {
            window.location.href = 'https://www.google.com'; 
        });

        volumeSlider.addEventListener('input', (e) => {
            let val = e.target.value;
            volText.innerText = val;
            if (masterGain) {
                // 滑動音量條時，手動重置淡入淡出數值
                masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                masterGain.gain.setValueAtTime((val / 100) * 0.3, audioCtx.currentTime);
            }
        });

        uiScaleSlider.addEventListener('input', (e) => {
            let scaleVal = e.target.value;
            uiScaleText.innerText = scaleVal;
            document.documentElement.style.setProperty('--user-ui-scale', scaleVal / 100);
            localStorage.setItem('rpg_game_ui_scale', scaleVal);
        });

        function togglePause() {
            if (playerHP <= 0) return; 

            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.style.display = 'flex';       
                gameStage.classList.add('paused-anim');    
            } else {
                pauseOverlay.style.display = 'none';       
                gameStage.classList.remove('paused-anim'); 
                keys.left = false;
                keys.right = false;
                updateMovingDir();
            }
        }

        function restartGame() {
            playerLV = 1;
            playerEXP = 0;
            playerMaxEXP = 2; 
            playerHP = 100;
            playerShield = 0;
            
            playerIsHurt = false;
            playerHurtTimer = 0;
            playerImg.style.filter = 'none';

            killCount = 0;

            updateHUD();

            monsters.forEach(m => { if (m.el.parentNode) gameStage.removeChild(m.el); });
            monsters = [];
            
            shields.forEach(s => { if (s.el.parentNode) gameStage.removeChild(s.el); });
            shields = [];

            projectiles.forEach(p => { if (p.el.parentNode) gameStage.removeChild(p.el); });
            projectiles = [];
            
            // 清除並在開始時生成一些初始的背景雲朵
            clouds.forEach(c => { if (c.el.parentNode) gameStage.removeChild(c.el); });
            clouds = [];
            let screenWidth = gameStage.offsetWidth / gameScale;
            for(let i=0; i<3; i++) {
                spawnCloud(Math.random() * screenWidth);
            }
            
            document.querySelectorAll('.vfx-light').forEach(light => {
                if (light.parentNode) gameStage.removeChild(light);
            });

            logicCharY = 0; logicVelocityY = 0; logicFloorX = -800;
            isJumping = false; attacking = false; movingDir = 0;
            keys.left = false; keys.right = false;
            playerImg.src = standImg;
            playerWrapper.style.transform = `translate(-50%, 0px)`;
            
            isPaused = false; 
            pauseOverlay.style.display = 'none'; 
            gameStage.classList.remove('paused-anim');
        }

        homeBtn.addEventListener('click', () => {
            gameStage.style.display = 'none';
            mainMenu.style.display = 'flex';
            menuBgVideo.style.display = 'block'; 
            
            setBGM(currentMenuTheme); 
            
            restartGame(); 
            isPaused = true; 
        });

        gameOverContinueBtn.addEventListener('click', () => {
            gameOverOverlay.style.display = 'none';
            gameStage.style.display = 'none';
            mainMenu.style.display = 'flex';
            menuBgVideo.style.display = 'block'; 
            
            setBGM(currentMenuTheme); 
            
            restartGame(); 
            isPaused = true; 
        });

        // === 事件監聽綁定區 ===

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        document.getElementById('rightBtn').addEventListener('mousedown', () => { keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseup', () => { keys.right = false; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseleave', () => { keys.right = false; updateMovingDir(); });

        document.getElementById('leftBtn').addEventListener('mousedown', () => { keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseup', () => { keys.left = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseleave', () => { keys.left = false; updateMovingDir(); });

        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        document.getElementById('attackBtn').addEventListener('mousedown', attack);

        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; updateMovingDir(); });
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                if (gameStage.style.display === 'block') togglePause();
            }
            if (isPaused) return; 
            
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); jump(); }
            if (e.key === 'a' || e.key === 'A') attack();
            
            updateMovingDir();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowLeft') keys.left = false;
            updateMovingDir();
        });

        fullscreenBtn.addEventListener('click', () => {
            toggleFullScreen();
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                fullscreenBtn.innerText = "退出全螢幕";
            } else {
                fullscreenBtn.innerText = "全螢幕";
            }
        });

        // 初始載入時手動重置一次雲朵避免畫面太空
        let screenWidth = window.innerWidth / gameScale;
        for(let i=0; i<3; i++) {
            spawnCloud(Math.random() * screenWidth);
        }

    </script>
</body>
</html>
