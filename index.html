<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>2D 動作遊戲：戰鬥與物理特效版 (歷史紀錄版)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: black;
            overflow: hidden;
        }

        /* 當遊戲暫停時，強制凍結舞台內所有的 CSS 動畫 */
        .paused-anim * {
            animation-play-state: paused !important;
        }

        .floor-track {
            position: absolute;
            bottom: 0;
            left: 0;
            display: flex;
            height: 400px;
            width: max-content;
        }

        .floor-track img {
            width: 800px;
            height: 400px;
            object-fit: cover;
            image-rendering: pixelated; 
            flex-shrink: 0; 
        }

        #playerWrapper {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        #playerImg {
            width: 150px;
            image-rendering: pixelated; 
            transition: transform 0.1s;
        }

        /* === 怪物與子彈樣式 === */
        .monster {
            position: absolute;
            width: 180px;
            image-rendering: pixelated; 
            z-index: 5;
            transform-origin: center center;
            transform: scaleX(var(--mirror, 1));
        }

        /* === 特效相關的 CSS 動畫 === */
        @keyframes monsterShake {
            0% { transform: scaleX(var(--mirror, 1)) translate(1px, 1px) rotate(0deg); }
            10% { transform: scaleX(var(--mirror, 1)) translate(-1px, -2px) rotate(-1deg); }
            20% { transform: scaleX(var(--mirror, 1)) translate(-3px, 0px) rotate(1deg); }
            30% { transform: scaleX(var(--mirror, 1)) translate(3px, 2px) rotate(0deg); }
            40% { transform: scaleX(var(--mirror, 1)) translate(1px, -1px) rotate(1deg); }
            50% { transform: scaleX(var(--mirror, 1)) translate(-1px, 2px) rotate(-1deg); }
            60% { transform: scaleX(var(--mirror, 1)) translate(-3px, 1px) rotate(0deg); }
            70% { transform: scaleX(var(--mirror, 1)) translate(3px, 1px) rotate(-1deg); }
            80% { transform: scaleX(var(--mirror, 1)) translate(-1px, -1px) rotate(1deg); }
            90% { transform: scaleX(var(--mirror, 1)) translate(1px, 2px) rotate(0deg); }
            100% { transform: scaleX(var(--mirror, 1)) translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes monsterShrinkVanish {
            0% { transform: scaleX(var(--mirror, 1)) scale(1); opacity: 1; }
            100% { transform: scaleX(var(--mirror, 1)) scale(0.1); opacity: 0; }
        }

        @keyframes whiteLightEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 20px 10px #fff; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; box-shadow: 0 0 80px 40px #fff; }
        }

        .monster-hit {
            animation: monsterShake 0.1s infinite;
        }

        .monster-vanishing {
            animation: monsterShrinkVanish 0.3s forwards;
            pointer-events: none;
        }

        .vfx-light {
            position: absolute;
            width: 60px; 
            height: 60px;
            background-color: white;
            border-radius: 50%;
            z-index: 100;
            animation: whiteLightEffect 0.3s forwards;
            pointer-events: none;
        }

        .projectile {
            position: absolute;
            font-size: 40px;
            font-weight: bold;
            image-rendering: pixelated; 
            z-index: 15;
            color: #d84315;
            text-shadow: 0 0 10px #ff8a65;
            transform-origin: center center;
        }

        /* === 抬頭顯示器 (HUD) === */
        .hud-hp {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        /* 【新增】最高紀錄顯示標籤 */
        .hud-highest-lv {
            position: absolute;
            top: 70px; /* 放在 HP 條下方 */
            left: 20px;
            background: rgba(255, 215, 0, 0.15); /* 微透明金黃色背景 */
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 5px 12px;
            border-radius: 15px;
            color: #ffd54f;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
            text-shadow: 1px 1px 2px black;
            backdrop-filter: blur(5px);
        }

        .hud-exp {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .stat-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .stat-label {
            font-size: 18px;
            min-width: 45px;
            text-shadow: 1px 1px 2px black;
        }

        .bar-bg {
            width: 200px;
            height: 18px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease-out;
        }

        .hp-fill {
            background: linear-gradient(90deg, #d32f2f, #f44336);
            width: 100%;
        }

        .exp-fill {
            background: linear-gradient(90deg, #fbc02d, #ffeb3b);
            width: 0%;
        }

        .stat-text {
            font-size: 14px;
            min-width: 70px;
            text-align: center;
        }

        /* === 浮動 UI 遊戲控制器 === */
        .hint { 
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4); 
            font-size: 16px;
            pointer-events: none;
            z-index: 100;
        }

        .controls-left {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .controls-right {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
            z-index: 100;
            align-items: flex-end;
        }

        .controls-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 15px; 
        }

        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: 0.1s;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.9);
        }

        .btn.jump-btn {
            width: 90px;
            height: 90px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(216, 67, 21, 0.6);
            border-color: rgba(255, 138, 101, 0.8);
        }
        .btn.jump-btn:active { background: rgba(191, 54, 12, 0.8); }

        .btn.attack-btn {
            width: 80px;
            height: 80px;
            font-size: 20px;
            font-weight: bold;
            background: rgba(191, 54, 12, 0.6);
            border-color: rgba(255, 138, 101, 0.8);
        }
        .btn.attack-btn:active { background: rgba(127, 36, 8, 0.8); }

        .btn.sys-btn {
            width: auto;
            height: 40px;
            padding: 0 15px;
            font-size: 14px;
            border-radius: 20px;
            font-weight: bold;
        }
        .btn.sys-btn.pause-toggle {
            background: rgba(255, 193, 7, 0.5);
            border-color: rgba(255, 235, 59, 0.8);
        }

        /* === 暫停畫面覆蓋層 === */
        .pause-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); 
            z-index: 999; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pause-menu {
            background: rgba(20, 20, 20, 0.8);
            padding: 50px 80px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .pause-menu h2 {
            color: white;
            margin: 0 0 20px 0;
            font-size: 40px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px black;
        }

        .pause-menu-btn {
            background: rgba(255, 255, 255, 0.8);
            color: #111;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .pause-menu-btn:hover {
            background: white;
            transform: scale(1.05);
        }
        .pause-menu-btn:active {
            transform: scale(0.95);
        }
        .pause-menu-btn.danger {
            background: rgba(244, 67, 54, 0.8);
            color: white;
        }
        .pause-menu-btn.danger:hover { background: rgba(244, 67, 54, 1); }

    </style>
</head>
<body>

    <div class="stage" id="gameStage">
        
        <div class="hud-hp">
            <div class="stat-box">
                <span class="stat-label" style="color: #ff5252;">HP</span>
                <div class="bar-bg"><div class="bar-fill hp-fill" id="hpBar"></div></div>
                <span class="stat-text" id="hpText">100 / 100</span>
            </div>
        </div>

        <div class="hud-highest-lv">
            👑 最高紀錄: LV <span id="highestLvText">1</span>
        </div>

        <div class="hud-exp">
            <div class="stat-box">
                <span class="stat-label" id="lvText" style="color: #ffd54f;">LV 1</span>
                <div class="bar-bg"><div class="bar-fill exp-fill" id="expBar"></div></div>
                <span class="stat-text" id="expText">0 / 2</span>
            </div>
        </div>

        <div class="floor-track" id="floorTrack"></div>

        <div id="playerWrapper">
            <img id="playerImg" src="yayun_stand.png" alt="角色">
        </div>

        <div class="hint">鍵盤 ← →, Space (跳躍), A (攻擊)</div>
        
        <div class="controls-left">
            <div class="btn" id="leftBtn">◀</div>
            <div class="btn" id="rightBtn">▶</div>
        </div>

        <div class="controls-right">
            <div class="btn attack-btn" id="attackBtn">ATK</div>
            <div class="btn jump-btn" id="jumpBtn">JUMP</div>
        </div>

        <div class="controls-top-right">
            <div class="btn sys-btn pause-toggle" id="pauseBtn">暫停</div>
            <div class="btn sys-btn" id="fullscreenBtn">全螢幕</div>
        </div>

        <div id="pauseOverlay" class="pause-overlay" style="display: none;">
            <div class="pause-menu">
                <h2>遊戲暫停</h2>
                <button class="pause-menu-btn" id="resumeBtn">繼續遊玩</button>
                <button class="pause-menu-btn" id="restartBtn">重新遊玩</button>
                <button class="pause-menu-btn danger" id="homeBtn">回到主頁</button>
            </div>
        </div>
    </div>

    <script>
        const playerWrapper = document.getElementById('playerWrapper');
        const playerImg = document.getElementById('playerImg');
        const floorTrack = document.getElementById('floorTrack');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const gameStage = document.getElementById('gameStage');
        
        const pauseBtn = document.getElementById('pauseBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const homeBtn = document.getElementById('homeBtn');

        let playerHP = 100;
        let playerMaxHP = 100;
        let playerLV = 1;
        let playerEXP = 0;
        let playerMaxEXP = 2; 

        // 【新增】從瀏覽器的 localStorage 讀取最高等級紀錄，如果沒有就預設為 1
        let highestLV = localStorage.getItem('rpg_game_highest_lv');
        highestLV = highestLV ? parseInt(highestLV) : 1;

        const floorImages = ['floor_grassland_1.png', 'floor_grassland_2.png'];
        const walkCycle = ['run_1.png', 'run_2.png', 'run_3.png', 'run_4.png', 'run_5.png', 'run_6.png'];
        const jumpImg = 'run_6.png';
        const standImg = 'yayun_stand.png';
        
        const monsterWalkCycle = ['mouse_run1.png', 'mouse_run2.png', 'mouse_run3.png', 'mouse_run4.png', 'mouse_run5.png', 'mouse_run6.png'];
        const harmImg = 'harm_mouse.png';
        const attackImg = 'yayun_attack.png';

        let currentFrame = 0;
        let animTimer = 0;
        
        let movingDir = 0; 
        let floorX = -800; 
        const moveSpeed = 6; 

        let isJumping = false;
        let charY = 0;       
        let velocityY = 0;   
        const jumpPower = 18; 
        const gravity = 1.2;  

        let facingDir = 1; 
        let attacking = false;
        let attackTimer = 0; 

        let monsters = [];
        let projectiles = [];

        let monsterSpawnTimer = 1500; 
        const monsterSpeed = 2; 
        const projectileSpeed = 12; 
        
        const HARM_STATE_TIME = 200; 

        const keys = { left: false, right: false };
        let isPaused = false;

        function updateHUD() {
            document.getElementById('hpText').innerText = `${playerHP} / ${playerMaxHP}`;
            document.getElementById('hpBar').style.width = `${(playerHP / playerMaxHP) * 100}%`;

            document.getElementById('lvText').innerText = `LV ${playerLV}`;
            document.getElementById('expText').innerText = `${playerEXP} / ${playerMaxEXP}`;
            document.getElementById('expBar').style.width = `${(playerEXP / playerMaxEXP) * 100}%`;

            // 【新增】更新畫面上的最高紀錄顯示
            document.getElementById('highestLvText').innerText = highestLV;
        }

        function gainEXP(amount) {
            playerEXP += amount;
            
            while (playerEXP >= playerMaxEXP) {
                playerEXP -= playerMaxEXP; 
                playerLV++;                
                playerMaxEXP = Math.pow(2, playerLV); 

                // 【新增】如果目前等級超過了歷史最高紀錄，就更新並存檔！
                if (playerLV > highestLV) {
                    highestLV = playerLV;
                    localStorage.setItem('rpg_game_highest_lv', highestLV);
                }
            }
            updateHUD();
        }

        function getRandomFloor() {
            return floorImages[Math.floor(Math.random() * floorImages.length)];
        }

        for (let i = 0; i < 10; i++) {
            let img = document.createElement('img');
            img.src = getRandomFloor();
            floorTrack.appendChild(img);
        }

        updateHUD();

        setInterval(gameLoop, 20);

        function gameLoop() {
            if (isPaused) return;

            updatePhysics();
            updateFloor();
            updateEntities(); 
            updateAnimation();
        }

        function updateFloor() {
            if (movingDir !== 0) {
                floorX -= movingDir * moveSpeed; 
                playerImg.style.transform = movingDir === 1 ? 'scaleX(1)' : 'scaleX(-1)';
                facingDir = movingDir;
            }

            if (floorX <= -1600) {
                floorX += 800; 
                floorTrack.removeChild(floorTrack.firstElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.appendChild(newImg); 
            }
            else if (floorX >= 0) {
                floorX -= 800; 
                floorTrack.removeChild(floorTrack.lastElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.insertBefore(newImg, floorTrack.firstElementChild); 
            }

            floorTrack.style.transform = `translateX(${floorX}px)`;
        }

        function updatePhysics() {
            if (isJumping) {
                charY += velocityY; 
                velocityY -= gravity; 

                if (charY <= 0) {
                    charY = 0;
                    isJumping = false;
                    velocityY = 0;
                }
                playerWrapper.style.transform = `translate(-50%, -${charY}px)`;
            }
        }

        function updateAnimation() {
            if (attacking) {
                playerImg.src = attackImg;
                attackTimer -= 20; 
                if (attackTimer <= 0) {
                    attacking = false;
                    attackTimer = 0;
                }
                return; 
            }

            if (isJumping) {
                playerImg.src = jumpImg;
                return;
            }

            if (movingDir === 0) {
                playerImg.src = standImg;
                currentFrame = 0;
                animTimer = 0;
                return;
            }

            animTimer += 20; 
            if (animTimer >= 100) { 
                currentFrame = (currentFrame + 1) % walkCycle.length;
                playerImg.src = walkCycle[currentFrame];
                animTimer = 0;
            }
        }

        function updateEntities() {
            if (movingDir !== 0) {
                monsterSpawnTimer -= 20; 
                if (monsterSpawnTimer <= 0) {
                    spawnMonster();
                    monsterSpawnTimer = Math.random() * 1500 + 1500;
                }
            }

            for (let i = monsters.length - 1; i >= 0; i--) {
                let monster = monsters[i];
                
                if (!monster.hit && !monster.done) {
                    monster.x += (monsterSpeed * monster.dir) - (movingDir * moveSpeed);
                    monster.el.style.left = monster.x + 'px';
                    
                    monster.animTimer += 20;
                    if (monster.animTimer >= 100) {
                        monster.frame = (monster.frame + 1) % monsterWalkCycle.length;
                        monster.el.src = monsterWalkCycle[monster.frame];
                        monster.animTimer = 0;
                    }
                    
                    if (monster.x < -200 || monster.x > gameStage.offsetWidth + 200) {
                        gameStage.removeChild(monster.el);
                        monsters.splice(i, 1);
                        continue; 
                    }
                }

                if (monster.hit) {
                    monster.hitTimer -= 20; 
                    if (monster.hitTimer <= 0) {
                        monster.hit = false;
                        monster.done = true;
                        monster.doneTimer = 300; 
                        monster.el.className = 'monster monster-vanishing'; 
                        
                        spawnTemporaryLightEffect(monster.x + 90, 120); 
                    }
                }
                
                if (monster.done) {
                    monster.doneTimer -= 20;
                    if (monster.doneTimer <= 0) {
                        if (monster.el.parentNode) {
                            gameStage.removeChild(monster.el);
                        }
                        monsters.splice(i, 1);
                        continue;
                    }
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let projectile = projectiles[i];
                projectile.x += projectileSpeed * projectile.dir;
                projectile.el.style.left = projectile.x + 'px';

                let projectileRect = projectile.el.getBoundingClientRect();

                for (let j = monsters.length - 1; j >= 0; j--) {
                    let monster = monsters[j];
                    
                    if (monster.hit || monster.done) continue; 
                    
                    let monsterRect = monster.el.getBoundingClientRect();

                    if (
                        projectileRect.x < monsterRect.x + monsterRect.width &&
                        projectileRect.x + projectileRect.width > monsterRect.x &&
                        projectileRect.y < monsterRect.y + monsterRect.height &&
                        projectileRect.y + projectileRect.height > monsterRect.y
                    ) {
                        gameStage.removeChild(projectile.el);
                        projectiles.splice(i, 1); 
                        
                        monster.hit = true; 
                        monster.hitTimer = HARM_STATE_TIME; 
                        
                        monster.el.src = harmImg; 
                        monster.el.className = 'monster monster-hit'; 
                        
                        gainEXP(1);
                        break; 
                    }
                }

                if (projectiles[i] === projectile) { 
                    if (projectile.x < -100 || projectile.x > gameStage.offsetWidth + 100) {
                        if (projectile.el.parentNode) {
                            gameStage.removeChild(projectile.el);
                            projectiles.splice(i, 1);
                        }
                    }
                }
            }
        }

        function spawnMonster() {
            let img = document.createElement('img');
            img.src = monsterWalkCycle[0]; 
            img.className = 'monster';
            img.style.width = '180px'; 
            
            let initialX, dir;
            if (movingDir === 1) { 
                initialX = gameStage.offsetWidth;
                dir = -1; 
            } else if (movingDir === -1) { 
                initialX = -180; 
                dir = 1; 
            }

            img.style.left = initialX + 'px';
            img.style.bottom = '80px'; 

            let mirrorValue = (dir === 1) ? -1 : 1;
            img.style.setProperty('--mirror', mirrorValue);

            gameStage.appendChild(img);
            monsters.push({ 
                el: img, 
                x: initialX, 
                dir: dir, 
                hit: false, 
                hitTimer: 0, 
                done: false, 
                doneTimer: 0,
                frame: 0,
                animTimer: 0
            });
        }

        function spawnTemporaryLightEffect(x, y) {
            let span = document.createElement('div');
            span.className = 'vfx-light';
            
            span.style.left = `${x}px`;
            span.style.bottom = `${y}px`;
            
            gameStage.appendChild(span);
            
            span.addEventListener('animationend', () => {
                if (span.parentNode) {
                    gameStage.removeChild(span); 
                }
            });
        }

        function spawnProjectile() {
            let span = document.createElement('span');
            span.innerHTML = '🔥';
            span.className = 'projectile';
            span.style.fontSize = '40px'; 
            span.style.imageRendering = 'pixelated';
            
            span.style.transform = 'rotate(-90deg)';
            
            let spawnX = gameStage.offsetWidth / 2;
            let spawnY = 45 + charY + 80; 

            span.style.left = spawnX + 'px';
            span.style.bottom = spawnY + 'px';
            gameStage.appendChild(span);
            projectiles.push({ el: span, x: spawnX, dir: facingDir });
        }

        function jump() {
            if (!isJumping && !isPaused) {
                isJumping = true;
                velocityY = jumpPower; 
            }
        }

        function attack() {
            if (!attacking && !isPaused) {
                attacking = true;
                attackTimer = 200; 
                playerImg.src = attackImg; 
                spawnProjectile();
            }
        }

        function updateMovingDir() {
            if (keys.right && !keys.left) movingDir = 1;
            else if (keys.left && !keys.right) movingDir = -1;
            else movingDir = 0;
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.style.display = 'flex';
                gameStage.classList.add('paused-anim');
            } else {
                pauseOverlay.style.display = 'none';
                gameStage.classList.remove('paused-anim');
                keys.left = false;
                keys.right = false;
                updateMovingDir();
            }
        }

        function restartGame() {
            playerLV = 1;
            playerEXP = 0;
            playerMaxEXP = 2; 
            updateHUD();

            monsters.forEach(m => {
                if (m.el.parentNode) gameStage.removeChild(m.el);
            });
            monsters = [];

            projectiles.forEach(p => {
                if (p.el.parentNode) gameStage.removeChild(p.el);
            });
            projectiles = [];
            
            const vfxLights = document.querySelectorAll('.vfx-light');
            vfxLights.forEach(light => {
                if (light.parentNode) gameStage.removeChild(light);
            });

            charY = 0;
            velocityY = 0;
            isJumping = false;
            attacking = false;
            movingDir = 0;
            keys.left = false;
            keys.right = false;
            playerImg.src = standImg;
            playerWrapper.style.transform = `translate(-50%, -0px)`;
            
            togglePause();
        }

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);
        
        homeBtn.addEventListener('click', () => {
            window.location.reload();
        });

        document.getElementById('rightBtn').addEventListener('mousedown', () => { keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseup', () => { keys.right = false; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseleave', () => { keys.right = false; updateMovingDir(); });

        document.getElementById('leftBtn').addEventListener('mousedown', () => { keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseup', () => { keys.left = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseleave', () => { keys.left = false; updateMovingDir(); });

        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        document.getElementById('attackBtn').addEventListener('mousedown', attack);

        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; updateMovingDir(); });
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                togglePause();
            }
            if (isPaused) return; 
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault(); 
                jump();
            }
            if (e.key === 'a' || e.key === 'A') {
                attack();
            }
            updateMovingDir();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowLeft') keys.left = false;
            updateMovingDir();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                gameStage.requestFullscreen().catch(err => {
                    alert(`無法進入全螢幕：${err.message}`);
                });
                fullscreenBtn.innerText = "退出全螢幕";
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerText = "進入全螢幕";
            }
        });

    </script>
</body>
</html>
