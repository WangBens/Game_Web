<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>啟程：大冒險</title>
    <style>
        /* =========================================
           CSS 樣式區塊：負責畫面排版、顏色與動畫特效
           ========================================= */
        
        :root {
            --scale: 1;
            --vh: 1vh;
        }

        /* === 1. 網頁基礎與遊戲舞台 === */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
            position: fixed; 
            top: 0; 
            left: 0;
            width: 100%;
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100); 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
            overscroll-behavior: none;
            touch-action: none; 
        }

        .stage {
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            display: none; 
        }

        .paused-anim * {
            animation-play-state: paused !important;
        }

        /* === 2. 地板與背景捲動 (受 gameScale 影響) === */
        .floor-track {
            position: absolute;
            bottom: 0;
            left: 0;
            display: flex;
            height: calc(400px * var(--scale));
            width: max-content;
        }

        .floor-track img {
            width: calc(800px * var(--scale));
            height: calc(400px * var(--scale));
            object-fit: cover;
            image-rendering: pixelated; 
            flex-shrink: 0; 
        }

        /* === 3. 主角定位與樣式 (受 gameScale 影響) === */
        #playerWrapper {
            position: absolute;
            /* 【修正】將高度降回 45px，完美貼齊草地基準線 */
            bottom: calc(45px * var(--scale)); 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10;
        }

        #playerImg {
            width: calc(150px * var(--scale));
            image-rendering: pixelated; 
            transition: transform 0.1s; 
        }

        /* === 4. 怪物與子彈樣式 (受 gameScale 影響) === */
        .monster {
            position: absolute;
            width: calc(180px * var(--scale));
            image-rendering: pixelated; 
            z-index: 5;
            transform-origin: center center; 
            transform: scaleX(var(--mirror, 1)); 
        }

        .projectile {
            position: absolute;
            font-size: calc(40px * var(--scale));
            font-weight: bold;
            image-rendering: pixelated; 
            z-index: 15;
            color: #d84315;
            text-shadow: 0 0 calc(10px * var(--scale)) #ff8a65; 
            transform-origin: center center;
        }

        /* === 5. 特效相關的 CSS 動畫 === */
        @keyframes monsterShake {
            0% { transform: scaleX(var(--mirror, 1)) translate(1px, 1px) rotate(0deg); }
            10% { transform: scaleX(var(--mirror, 1)) translate(-1px, -2px) rotate(-1deg); }
            20% { transform: scaleX(var(--mirror, 1)) translate(-3px, 0px) rotate(1deg); }
            30% { transform: scaleX(var(--mirror, 1)) translate(3px, 2px) rotate(0deg); }
            40% { transform: scaleX(var(--mirror, 1)) translate(1px, -1px) rotate(1deg); }
            50% { transform: scaleX(var(--mirror, 1)) translate(-1px, 2px) rotate(-1deg); }
            60% { transform: scaleX(var(--mirror, 1)) translate(-3px, 1px) rotate(0deg); }
            70% { transform: scaleX(var(--mirror, 1)) translate(3px, 1px) rotate(-1deg); }
            80% { transform: scaleX(var(--mirror, 1)) translate(-1px, -1px) rotate(1deg); }
            90% { transform: scaleX(var(--mirror, 1)) translate(1px, 2px) rotate(0deg); }
            100% { transform: scaleX(var(--mirror, 1)) translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes monsterShrinkVanish {
            0% { transform: scaleX(var(--mirror, 1)) scale(1); opacity: 1; }
            100% { transform: scaleX(var(--mirror, 1)) scale(0.1); opacity: 0; }
        }

        @keyframes whiteLightEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 calc(10px * var(--scale)) calc(5px * var(--scale)) #fff; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; box-shadow: 0 0 calc(40px * var(--scale)) calc(20px * var(--scale)) #fff; }
        }

        @keyframes logoBreathe {
            0% { transform: scale(0.5); }
            50% { transform: scale(0.55); } 
            100% { transform: scale(0.5); }
        }

        @keyframes mainLogoBreathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); }
        }

        .monster-hit { animation: monsterShake 0.1s infinite; }
        .monster-vanishing { animation: monsterShrinkVanish 0.3s forwards; pointer-events: none; }
        
        .vfx-light {
            position: absolute;
            width: calc(15px * var(--scale)); 
            height: calc(15px * var(--scale));
            background-color: white;
            border-radius: 50%;
            z-index: 100;
            animation: whiteLightEffect 0.3s forwards;
            pointer-events: none;
        }

        /* === 6. UI 介面 (固定大小，不受 gameScale 影響) === */
        .hud-hp { 
            position: absolute; 
            top: max(20px, env(safe-area-inset-top)); 
            left: max(20px, env(safe-area-inset-left)); 
            z-index: 100; 
        }
        
        .hud-highest-lv {
            position: absolute; 
            top: max(75px, calc(env(safe-area-inset-top) + 55px)); 
            left: max(20px, env(safe-area-inset-left));
            background: rgba(255, 215, 0, 0.15); 
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 5px 12px; 
            border-radius: 15px;
            color: #ffd54f; font-weight: bold; 
            font-size: 14px;
            z-index: 100; text-shadow: 1px 1px 2px black;
            backdrop-filter: blur(5px);
        }

        .hud-exp {
            position: absolute; 
            bottom: max(10px, env(safe-area-inset-bottom)); 
            left: 50%;
            transform: translateX(-50%); z-index: 100;
        }

        .stat-box {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.6); 
            padding: 8px 15px;
            border-radius: 25px; border: 2px solid rgba(255, 255, 255, 0.2);
            color: white; font-weight: bold; backdrop-filter: blur(5px);
        }
        .stat-label { font-size: 18px; min-width: 45px; text-shadow: 1px 1px 2px black; }
        .bar-bg {
            width: max(150px, 25vw); height: 18px;
            background: rgba(255, 255, 255, 0.2); border-radius: 10px;
            overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .bar-fill { height: 100%; transition: width 0.3s ease-out; }
        .hp-fill { background: linear-gradient(90deg, #d32f2f, #f44336); width: 100%; }
        .exp-fill { background: linear-gradient(90deg, #fbc02d, #ffeb3b); width: 0%; }
        .stat-text { font-size: 14px; min-width: 70px; text-align: center; }

        /* 遊戲 LOGO 獨立維持響應大小 */
        #gameLogo {
            position: absolute; 
            top: -20px; 
            right: max(-30px, calc(env(safe-area-inset-right) - 50px)); 
            width: 300px; 
            z-index: 90; pointer-events: none; 
            animation: logoBreathe 2.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); 
        }

        .hint { 
            position: absolute; top: max(80px, env(safe-area-inset-top)); width: 100%;
            text-align: center; color: rgba(255,255,255,0.4); 
            font-size: 16px; pointer-events: none; z-index: 100;
        }

        /* === 7. 操作按鈕 (固定好按的大小，不受 gameScale 影響) === */
        
        /* 確保底部與左右都有安全邊距，不被手機邊緣切斷 */
        .controls-left { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); left: max(20px, env(safe-area-inset-left)); display: flex; gap: 15px; z-index: 100; }
        .controls-right { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); right: max(20px, env(safe-area-inset-right)); display: flex; flex-direction: column-reverse; gap: 15px; z-index: 100; align-items: flex-end; }
        .controls-top-center { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }

        .btn {
            width: clamp(60px, 12vmin, 80px); 
            height: clamp(60px, 12vmin, 80px);
            background: rgba(255, 255, 255, 0.2); color: white;
            border: 2px solid rgba(255, 255, 255, 0.5); 
            border-radius: 50%;
            font-size: clamp(20px, 4vmin, 28px); cursor: pointer; display: flex;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: 0.1s;
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
        
        .btn.jump-btn { 
            width: clamp(75px, 15vmin, 95px); height: clamp(75px, 15vmin, 95px); 
            font-size: clamp(18px, 3.5vmin, 22px); font-weight: bold; background: rgba(216, 67, 21, 0.6); border-color: rgba(255, 138, 101, 0.8); 
        }
        .btn.jump-btn:active { background: rgba(191, 54, 12, 0.8); }
        .btn.attack-btn { 
            width: clamp(65px, 13vmin, 85px); height: clamp(65px, 13vmin, 85px); 
            font-size: clamp(16px, 3vmin, 20px); font-weight: bold; background: rgba(191, 54, 12, 0.6); border-color: rgba(255, 138, 101, 0.8); 
        }
        .btn.attack-btn:active { background: rgba(127, 36, 8, 0.8); }
        .btn.sys-btn { 
            width: auto; height: 40px; 
            padding: 0 15px; font-size: 14px; 
            border-radius: 20px; font-weight: bold; 
        }
        .btn.sys-btn.pause-toggle { background: rgba(255, 193, 7, 0.5); border-color: rgba(255, 235, 59, 0.8); }

        /* === 8. 遊戲暫停選單 === */
        .pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); 
            z-index: 999; display: flex; justify-content: center; align-items: center;
        }
        .pause-menu {
            background: rgba(20, 20, 20, 0.8); padding: 40px 60px;
            border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: 20px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .pause-menu h2 { color: white; margin: 0 0 15px 0; font-size: 32px; letter-spacing: 5px; text-shadow: 2px 2px 5px black; }

        .menu-btn {
            background: rgba(255, 255, 255, 0.8); color: #111; border: none;
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            border-radius: 40px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .menu-btn:hover { background: white; transform: scale(1.05); }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn.danger { background: rgba(244, 67, 54, 0.8); color: white; }
        .menu-btn.danger:hover { background: rgba(244, 67, 54, 1); }

        /* === 9. 主畫面與設定畫面樣式 === */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; 
            background-image: url('game_start_background.png');
            background-size: cover; background-position: center;
        }
        #mainMenuLogo {
            width: clamp(250px, 60vw, 450px); margin-bottom: 40px;
            animation: mainLogoBreathe 3s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }
        .main-btn-group { display: flex; flex-direction: column; gap: 20px; width: clamp(200px, 50vw, 250px); }
        
        .blur-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); z-index: -1;
        }
        .settings-content {
            background: rgba(20, 20, 20, 0.8); padding: 40px 60px;
            border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: 25px; text-align: center; color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .settings-content h2 { margin: 0; font-size: 32px; letter-spacing: 3px; }
        .settings-item { display: flex; flex-direction: column; gap: 10px; align-items: center; font-size: 20px; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* === 10. 手機直向螢幕旋轉提示層 === */
        #orientationOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            z-index: 99999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
            display: none; 
        }

        #orientationOverlay h1 { font-size: 32px; margin-bottom: 20px; color: #ffeb3b;}
        #orientationOverlay p { font-size: 18px; line-height: 1.5; padding: 0 20px; }
        
        .rotate-phone-icon {
            width: 80px; height: 120px;
            border: 4px solid white; border-radius: 10px;
            margin-bottom: 30px;
            position: relative;
            animation: rotatePhone 2s infinite ease-in-out;
        }
        .rotate-phone-icon::after {
            content: ''; position: absolute;
            bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 15px; border-radius: 50%; border: 2px solid white;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }
    </style>
</head>
<body>

    <div id="orientationOverlay">
        <div class="rotate-phone-icon"></div>
        <h1>請旋轉手機</h1>
        <p>為了獲得最佳遊戲體驗，<br>請將您的設備旋轉至<b>橫向 (Landscape)</b> 遊玩。</p>
    </div>

    <div id="mainMenu" class="screen">
        <img id="mainMenuLogo" src="Game_LOGO.png" alt="Game Logo">
        <div class="main-btn-group">
            <button class="menu-btn" id="startBtn">遊玩遊戲</button>
            <button class="menu-btn" id="openSettingsBtn">設定</button>
            <button class="menu-btn danger" id="exitBrowserBtn">回到瀏覽器</button>
        </div>
    </div>

    <div id="settingsMenu" class="screen" style="display: none;">
        <div class="blur-overlay"></div> 
        <div class="settings-content">
            <h2>系統設定</h2>
            <div class="settings-item">
                <label for="volumeSlider">遊戲音量: <span id="volText">50</span>%</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>
            <button class="menu-btn" id="closeSettingsBtn" style="margin-top: 20px;">返回主頁</button>
        </div>
    </div>

    <div class="stage" id="gameStage">
        
        <img id="gameLogo" src="Game_LOGO.png" alt="Game Logo">

        <div class="hud-hp">
            <div class="stat-box">
                <span class="stat-label" style="color: #ff5252;">HP</span>
                <div class="bar-bg"><div class="bar-fill hp-fill" id="hpBar"></div></div>
                <span class="stat-text" id="hpText">100 / 100</span>
            </div>
        </div>

        <div class="hud-highest-lv">
            👑 最高紀錄: LV <span id="highestLvText">1</span>
        </div>

        <div class="hud-exp">
            <div class="stat-box">
                <span class="stat-label" id="lvText" style="color: #ffd54f;">LV 1</span>
                <div class="bar-bg"><div class="bar-fill exp-fill" id="expBar"></div></div>
                <span class="stat-text" id="expText">0 / 2</span>
            </div>
        </div>

        <div class="floor-track" id="floorTrack"></div>

        <div id="playerWrapper">
            <img id="playerImg" src="yayun_stand.png" alt="角色">
        </div>

        <div class="hint">鍵盤 ← →, Space (跳躍), A (攻擊)</div>
        
        <div class="controls-left">
            <div class="btn" id="leftBtn">◀</div>
            <div class="btn" id="rightBtn">▶</div>
        </div>

        <div class="controls-right">
            <div class="btn attack-btn" id="attackBtn">ATK</div>
            <div class="btn jump-btn" id="jumpBtn">JUMP</div>
        </div>

        <div class="controls-top-center">
            <div class="btn sys-btn pause-toggle" id="pauseBtn">暫停</div>
            <div class="btn sys-btn" id="fullscreenBtn">全螢幕</div>
        </div>

        <div id="pauseOverlay" class="pause-overlay" style="display: none;">
            <div class="pause-menu">
                <h2>遊戲暫停</h2>
                <button class="menu-btn" id="resumeBtn">繼續遊玩</button>
                <button class="menu-btn" id="restartBtn">重新遊玩</button>
                <button class="menu-btn danger" id="homeBtn">回到主頁</button>
            </div>
        </div>
    </div>

    <script>
        // === 響應式邏輯與環境偵測 ===
        
        // 偵測是否為手機或平板
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // 核心渲染縮放值 (只縮放遊戲世界，不縮放 UI)
        let gameScale = 1;

        function fixViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            
            // 基礎設計畫面高度設為 800px，計算當前螢幕的等比例縮放值
            gameScale = window.innerHeight / 800;
            document.documentElement.style.setProperty('--scale', gameScale);

            checkOrientation();
        }
        window.addEventListener('resize', fixViewportHeight);
        window.addEventListener('orientationchange', fixViewportHeight);
        fixViewportHeight(); 

        // 偵測直立螢幕並強制暫停遊戲
        function checkOrientation() {
            if (!isMobile) return; 

            const isPortrait = window.innerHeight > window.innerWidth;
            const overlay = document.getElementById('orientationOverlay');
            
            if (isPortrait) {
                overlay.style.display = 'flex';
                if (gameStage.style.display === 'block' && !isPaused) {
                    togglePause(); 
                }
            } else {
                overlay.style.display = 'none';
            }
        }

        // === 1. 取得 HTML DOM 元素 ===
        const playerWrapper = document.getElementById('playerWrapper'); 
        const playerImg = document.getElementById('playerImg');         
        const floorTrack = document.getElementById('floorTrack');       
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const gameStage = document.getElementById('gameStage');
        
        const pauseBtn = document.getElementById('pauseBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const homeBtn = document.getElementById('homeBtn');

        const mainMenu = document.getElementById('mainMenu');
        const settingsMenu = document.getElementById('settingsMenu');
        const startBtn = document.getElementById('startBtn');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const exitBrowserBtn = document.getElementById('exitBrowserBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volText = document.getElementById('volText');

        // === 2. 玩家狀態與數值設定 ===
        let playerHP = 100;
        let playerMaxHP = 100;
        let playerLV = 1;
        let playerEXP = 0;
        let playerMaxEXP = 2; 

        let highestLV = localStorage.getItem('rpg_game_highest_lv');
        highestLV = highestLV ? parseInt(highestLV) : 1;

        // === 3. 圖片資源與動畫陣列 ===
        const floorImages = ['floor_grassland_1.png', 'floor_grassland_2.png'];
        const walkCycle = ['run_1.png', 'run_2.png', 'run_3.png', 'run_4.png', 'run_5.png', 'run_6.png']; 
        const jumpImg = 'run_6.png'; 
        const standImg = 'yayun_stand.png'; 
        
        const monsterWalkCycle = ['mouse_run1.png', 'mouse_run2.png', 'mouse_run3.png', 'mouse_run4.png', 'mouse_run5.png', 'mouse_run6.png']; 
        const harmImg = 'harm_mouse.png'; 
        const attackImg = 'yayun_attack.png'; 

        // === 4. 邏輯常數與變數 ===
        const BASE_MOVE_SPEED = 6;
        const BASE_FLOOR_WIDTH = 800;
        const BASE_JUMP_POWER = 18;
        const BASE_GRAVITY = 1.2;
        const BASE_MONSTER_SPEED = 2;
        const BASE_PROJECTILE_SPEED = 12;
        const HARM_STATE_TIME = 200;

        let currentFrame = 0; 
        let animTimer = 0;    
        
        let movingDir = 0;    
        let logicFloorX = -800; 

        let isJumping = false;
        let logicCharY = 0;     
        let logicVelocityY = 0; 

        let facingDir = 1;   
        let attacking = false; 
        let attackTimer = 0;   

        let monsters = [];    
        let projectiles = []; 

        let monsterSpawnTimer = 1500; 
        const keys = { left: false, right: false }; 
        let isPaused = true; 

        // === 5. 遊戲核心函數 ===

        function updateHUD() {
            document.getElementById('hpText').innerText = `${playerHP} / ${playerMaxHP}`;
            document.getElementById('hpBar').style.width = `${(playerHP / playerMaxHP) * 100}%`;

            document.getElementById('lvText').innerText = `LV ${playerLV}`;
            document.getElementById('expText').innerText = `${playerEXP} / ${playerMaxEXP}`;
            document.getElementById('expBar').style.width = `${(playerEXP / playerMaxEXP) * 100}%`;

            document.getElementById('highestLvText').innerText = highestLV;
        }

        function gainEXP(amount) {
            playerEXP += amount;
            
            while (playerEXP >= playerMaxEXP) {
                playerEXP -= playerMaxEXP; 
                playerLV++;                
                playerMaxEXP = Math.pow(2, playerLV); 

                if (playerLV > highestLV) {
                    highestLV = playerLV;
                    localStorage.setItem('rpg_game_highest_lv', highestLV);
                }
            }
            updateHUD();
        }

        function getRandomFloor() {
            return floorImages[Math.floor(Math.random() * floorImages.length)];
        }

        for (let i = 0; i < 10; i++) {
            let img = document.createElement('img');
            img.src = getRandomFloor();
            floorTrack.appendChild(img);
        }

        updateHUD(); 
        setInterval(gameLoop, 20);

        function gameLoop() {
            if (isPaused) return; 

            updatePhysics();  
            updateFloor();    
            updateEntities(); 
            updateAnimation();
        }

        function updateFloor() {
            if (movingDir !== 0) {
                logicFloorX -= movingDir * BASE_MOVE_SPEED; 
                playerImg.style.transform = movingDir === 1 ? 'scaleX(1)' : 'scaleX(-1)'; 
                facingDir = movingDir;
            }

            if (logicFloorX <= -BASE_FLOOR_WIDTH * 2) {
                logicFloorX += BASE_FLOOR_WIDTH; 
                floorTrack.removeChild(floorTrack.firstElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.appendChild(newImg); 
            }
            else if (logicFloorX >= 0) {
                logicFloorX -= BASE_FLOOR_WIDTH; 
                floorTrack.removeChild(floorTrack.lastElementChild); 
                let newImg = document.createElement('img');
                newImg.src = getRandomFloor();
                floorTrack.insertBefore(newImg, floorTrack.firstElementChild); 
            }
            
            // 算好邏輯再套用縮放比例渲染，避免跑版
            floorTrack.style.transform = `translateX(${logicFloorX * gameScale}px)`;
        }

        function updatePhysics() {
            if (isJumping) {
                logicCharY += logicVelocityY; 
                logicVelocityY -= BASE_GRAVITY; 

                if (logicCharY <= 0) {
                    logicCharY = 0;
                    isJumping = false;
                    logicVelocityY = 0;
                }
                playerWrapper.style.transform = `translate(-50%, -${logicCharY * gameScale}px)`;
            }
        }

        function updateAnimation() {
            if (attacking) {
                playerImg.src = attackImg;
                attackTimer -= 20; 
                if (attackTimer <= 0) attacking = false; 
                return; 
            }

            if (isJumping) {
                playerImg.src = jumpImg; 
                return;
            }

            if (movingDir === 0) {
                playerImg.src = standImg; 
                currentFrame = 0;
                animTimer = 0;
                return;
            }

            animTimer += 20; 
            if (animTimer >= 100) { 
                currentFrame = (currentFrame + 1) % walkCycle.length;
                playerImg.src = walkCycle[currentFrame];
                animTimer = 0;
            }
        }

        function updateEntities() {
            if (movingDir !== 0) {
                monsterSpawnTimer -= 20; 
                if (monsterSpawnTimer <= 0) {
                    spawnMonster();
                    monsterSpawnTimer = Math.random() * 1500 + 1500; 
                }
            }

            // 動態螢幕邏輯寬度 (確保縮放後邊界刪除正常運作)
            let screenLogicWidth = gameStage.offsetWidth / gameScale;

            for (let i = monsters.length - 1; i >= 0; i--) {
                let monster = monsters[i];
                
                if (!monster.hit && !monster.done) {
                    // 怪物相對移動計算
                    monster.logicX += (BASE_MONSTER_SPEED * monster.dir) - (movingDir * BASE_MOVE_SPEED);
                    monster.el.style.left = `${monster.logicX * gameScale}px`;
                    
                    monster.animTimer += 20;
                    if (monster.animTimer >= 100) {
                        monster.frame = (monster.frame + 1) % monsterWalkCycle.length;
                        monster.el.src = monsterWalkCycle[monster.frame];
                        monster.animTimer = 0;
                    }
                    
                    if (monster.logicX < -200 || monster.logicX > screenLogicWidth + 200) {
                        gameStage.removeChild(monster.el);
                        monsters.splice(i, 1);
                        continue; 
                    }
                }

                if (monster.hit) {
                    monster.hitTimer -= 20; 
                    if (monster.hitTimer <= 0) {
                        monster.hit = false;
                        monster.done = true;
                        monster.doneTimer = 300; 
                        monster.el.className = 'monster monster-vanishing'; 
                        
                        spawnTemporaryLightEffect(monster.logicX + 90, 65); 
                    }
                }
                
                if (monster.done) {
                    monster.doneTimer -= 20;
                    if (monster.doneTimer <= 0) {
                        if (monster.el.parentNode) gameStage.removeChild(monster.el);
                        monsters.splice(i, 1);
                        continue;
                    }
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let projectile = projectiles[i];
                projectile.logicX += BASE_PROJECTILE_SPEED * projectile.dir;
                projectile.el.style.left = `${projectile.logicX * gameScale}px`;

                let projectileRect = projectile.el.getBoundingClientRect(); 

                for (let j = monsters.length - 1; j >= 0; j--) {
                    let monster = monsters[j];
                    if (monster.hit || monster.done) continue; 
                    
                    let monsterRect = monster.el.getBoundingClientRect(); 

                    if (
                        projectileRect.x < monsterRect.x + monsterRect.width &&
                        projectileRect.x + projectileRect.width > monsterRect.x &&
                        projectileRect.y < monsterRect.y + monsterRect.height &&
                        projectileRect.y + projectileRect.height > monsterRect.y
                    ) {
                        gameStage.removeChild(projectile.el); 
                        projectiles.splice(i, 1); 
                        
                        monster.hit = true; 
                        monster.hitTimer = HARM_STATE_TIME; 
                        monster.el.src = harmImg; 
                        monster.el.className = 'monster monster-hit'; 
                        
                        gainEXP(1); 
                        break; 
                    }
                }

                if (projectiles[i] === projectile) { 
                    if (projectile.logicX < -100 || projectile.logicX > screenLogicWidth + 100) {
                        if (projectile.el.parentNode) {
                            gameStage.removeChild(projectile.el);
                            projectiles.splice(i, 1);
                        }
                    }
                }
            }
        }

        function spawnMonster() {
            let img = document.createElement('img');
            img.src = monsterWalkCycle[0]; 
            img.className = 'monster';
            
            let screenLogicWidth = gameStage.offsetWidth / gameScale;
            let initialLogicX = movingDir === 1 ? screenLogicWidth : -180;
            let dir = movingDir === 1 ? -1 : 1; 

            img.style.left = `${initialLogicX * gameScale}px`;
            
            // 【修正】將怪物高度設定為 55px 基準線，完美貼齊地板
            img.style.bottom = `calc(55px * var(--scale))`; 

            let mirrorValue = (dir === 1) ? -1 : 1;
            img.style.setProperty('--mirror', mirrorValue);

            gameStage.appendChild(img);
            monsters.push({ 
                el: img, logicX: initialLogicX, dir: dir, hit: false, hitTimer: 0, 
                done: false, doneTimer: 0, frame: 0, animTimer: 0
            });
        }

        function spawnTemporaryLightEffect(logicX, logicY) {
            let span = document.createElement('div');
            span.className = 'vfx-light';
            span.style.left = `${logicX * gameScale}px`;
            span.style.bottom = `${logicY * gameScale}px`;
            gameStage.appendChild(span);
            
            span.addEventListener('animationend', () => {
                if (span.parentNode) gameStage.removeChild(span); 
            });
        }

        function spawnProjectile() {
            let span = document.createElement('span');
            span.innerHTML = '🔥';
            span.className = 'projectile';
            
            if (facingDir === 1) {
                span.style.transform = 'rotate(90deg)';
            } else {
                span.style.transform = 'rotate(-90deg)';
            }
            
            let spawnLogicX = (gameStage.offsetWidth / gameScale) / 2;
            let spawnLogicY = 45 + logicCharY + 60; // 對準主角的手部

            span.style.left = `${spawnLogicX * gameScale}px`;
            span.style.bottom = `${spawnLogicY * gameScale}px`;
            gameStage.appendChild(span);
            projectiles.push({ el: span, logicX: spawnLogicX, dir: facingDir });
        }

        // === 6. 玩家控制邏輯 ===

        function jump() {
            if (!isJumping && !isPaused) {
                isJumping = true;
                logicVelocityY = BASE_JUMP_POWER; 
            }
        }

        function attack() {
            if (!attacking && !isPaused) {
                attacking = true;
                attackTimer = 200; 
                playerImg.src = attackImg; 
                spawnProjectile();
            }
        }

        function updateMovingDir() {
            if (keys.right && !keys.left) movingDir = 1;
            else if (keys.left && !keys.right) movingDir = -1;
            else movingDir = 0;
        }

        // === 7. 系統功能 (暫停與選單切換) ===

        startBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameStage.style.display = 'block';
            pauseOverlay.style.display = 'none'; 
            isPaused = false; 
            checkOrientation(); 
        });

        openSettingsBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            settingsMenu.style.display = 'flex';
        });

        exitBrowserBtn.addEventListener('click', () => {
            window.location.href = 'https://www.google.com'; 
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
        });

        volumeSlider.addEventListener('input', (e) => {
            volText.innerText = e.target.value;
        });

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.style.display = 'flex';       
                gameStage.classList.add('paused-anim');    
            } else {
                pauseOverlay.style.display = 'none';       
                gameStage.classList.remove('paused-anim'); 
                keys.left = false;
                keys.right = false;
                updateMovingDir();
            }
        }

        function restartGame() {
            playerLV = 1;
            playerEXP = 0;
            playerMaxEXP = 2; 
            updateHUD();

            monsters.forEach(m => { if (m.el.parentNode) gameStage.removeChild(m.el); });
            monsters = [];
            projectiles.forEach(p => { if (p.el.parentNode) gameStage.removeChild(p.el); });
            projectiles = [];
            document.querySelectorAll('.vfx-light').forEach(light => {
                if (light.parentNode) gameStage.removeChild(light);
            });

            logicCharY = 0; logicVelocityY = 0; logicFloorX = -800;
            isJumping = false; attacking = false; movingDir = 0;
            keys.left = false; keys.right = false;
            playerImg.src = standImg;
            playerWrapper.style.transform = `translate(-50%, -0px)`;
            
            togglePause(); 
        }

        homeBtn.addEventListener('click', () => {
            gameStage.style.display = 'none';
            mainMenu.style.display = 'flex';
            
            restartGame(); 
            isPaused = true;
            pauseOverlay.style.display = 'none'; 
        });

        // === 8. 事件監聽綁定區 ===

        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        document.getElementById('rightBtn').addEventListener('mousedown', () => { keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseup', () => { keys.right = false; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('mouseleave', () => { keys.right = false; updateMovingDir(); });

        document.getElementById('leftBtn').addEventListener('mousedown', () => { keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseup', () => { keys.left = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('mouseleave', () => { keys.left = false; updateMovingDir(); });

        document.getElementById('jumpBtn').addEventListener('mousedown', jump);
        document.getElementById('attackBtn').addEventListener('mousedown', attack);

        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; updateMovingDir(); });
        document.getElementById('rightBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; updateMovingDir(); });
        document.getElementById('leftBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; updateMovingDir(); });
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                if (gameStage.style.display === 'block') togglePause();
            }
            if (isPaused) return; 
            
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); jump(); }
            if (e.key === 'a' || e.key === 'A') attack();
            
            updateMovingDir();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowLeft') keys.left = false;
            updateMovingDir();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                gameStage.requestFullscreen().catch(err => { alert(`無法進入全螢幕：${err.message}`); });
                fullscreenBtn.innerText = "退出全螢幕";
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerText = "全螢幕";
            }
        });

    </script>
</body>
</html>
